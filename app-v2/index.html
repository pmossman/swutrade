<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#0A0B0F" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#FAFAF7" media="(prefers-color-scheme: light)" />
    <title>SWUTrade</title>
    <script>
      // Pre-paint theme class so Tailwind + tokens.css resolve before React
      // mounts — avoids a flash-of-light-content on dark-preference devices.
      // Manual toggle in Settings will override this later (Phase 2).
      (function () {
        try {
          var mq = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)');
          if (mq && mq.matches) document.documentElement.classList.add('dark');
        } catch (_e) {
          /* no-op */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
