    <!-- interactive-widget=resizes-content tells the browser to shrink
         the layout viewport when the on-screen keyboard appears. Without
         this, fixed-positioned overlays (chat panel, modals) keep their
         layout-viewport-sized height when the keyboard opens, and iOS
         auto-scrolls them — exposing content from behind. Supported in
         iOS 16.4+ and recent Chrome/Edge. Older browsers ignore the
         segment and fall through to the default behavior. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
