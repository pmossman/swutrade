name: Session Followups Cron

# Periodic sweep that DMs trade-session participants about unread
# counterpart activity. Fires `/api/cron/session-followups` (rewrites
# to `/api/bot?action=cron-session-followups`).
#
# Why GitHub Actions instead of Vercel cron: Vercel Hobby caps cron
# frequency at daily. We need a much tighter cadence to make the
# DM-on-activity feel responsive. GitHub Actions has a 5-minute
# minimum which is the best we can do without paying for Pro;
# 5-min latency for a "you got a message" DM is acceptable for
# trade activity.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Hit the cron endpoint
        run: |
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "::error::CRON_SECRET secret is unset — the endpoint will 401 without it"
            exit 1
          fi
          if [ -z "${{ secrets.SWUTRADE_PUBLIC_URL }}" ]; then
            echo "::error::SWUTRADE_PUBLIC_URL secret is unset (e.g. https://beta.swutrade.com)"
            exit 1
          fi
          # Fail loudly on non-2xx so silent breakage shows up in the
          # Actions log instead of cron drift going unnoticed.
          http_code=$(curl -s -o /tmp/body.txt -w '%{http_code}' \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SWUTRADE_PUBLIC_URL }}/api/cron/session-followups")
          echo "Response: $http_code"
          cat /tmp/body.txt || true
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::Cron endpoint returned $http_code"
            exit 1
          fi
