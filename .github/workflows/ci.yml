name: CI

on:
  push:
    branches: [main, beta]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Step 1: Type check + unit/API tests + build ──────────────
  check:
    name: Types + Tests + Build
    runs-on: ubuntu-latest
    env:
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - name: Write env file
        if: env.POSTGRES_URL != ''
        run: |
          echo "SESSION_SECRET=$SESSION_SECRET" >> .env.local
          echo "POSTGRES_URL=$POSTGRES_URL" >> .env.local

      - name: TypeScript
        run: npx tsc -b --force

      - name: Unit + API tests
        run: npx vitest run

      - name: Vite build
        run: npx vite build

  # ── Step 2: Anonymous E2E (runs in parallel with check) ──────
  e2e-anonymous:
    name: E2E (Anonymous)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - id: weekkey
        run: echo "key=$(date +%Y-%U)" >> "$GITHUB_OUTPUT"

      - name: Cache card data
        id: datacache
        uses: actions/cache@v4
        with:
          path: |
            public/data
            scripts/cache
          key: card-data-${{ steps.weekkey.outputs.key }}

      - name: Fetch + enrich card data (cache miss only)
        if: steps.datacache.outputs.cache-hit != 'true'
        run: |
          FETCH_PRICES=1 npm run fetch-prices
          ENRICH=1 npm run enrich-cards

      - name: Cache Playwright browsers
        id: playwrightcache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwrightcache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached)
        if: steps.playwrightcache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run anonymous E2E
        run: npm run e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with: { name: playwright-anonymous, path: playwright-report/, retention-days: 7 }

  # ── Step 3: Wait for Vercel preview deploy ───────────────────
  wait-for-deploy:
    name: Wait for Vercel Deploy
    runs-on: ubuntu-latest
    needs: [check]
    if: github.event_name == 'push'
    timeout-minutes: 10
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Find and wait for Vercel deployment
        id: deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          SHA="${{ github.sha }}"
          REPO="${{ github.repository }}"
          echo "Waiting for Vercel deploy of $SHA..."

          # Poll GitHub deployments API for a deployment matching this commit
          for i in $(seq 1 40); do
            URL=$(gh api "repos/$REPO/deployments?sha=$SHA&per_page=5" \
              --jq '.[0].statuses_url // empty' 2>/dev/null)
            if [ -n "$URL" ]; then
              STATE=$(gh api "$URL" --jq '.[0].state // empty' 2>/dev/null)
              TARGET=$(gh api "$URL" --jq '.[0].target_url // empty' 2>/dev/null)
              echo "  Deploy state: $STATE ($TARGET)"
              # Short-circuit on terminal failure states. Without this
              # a failed deploy eats the full ~10 minute poll loop
              # while the e2e job downstream waits on its own timeout,
              # masking the actual error behind a generic CI timeout.
              case "$STATE" in
                failure|error)
                  echo "::error::Vercel deployment reported state=$STATE at $TARGET"
                  exit 1
                  ;;
              esac
              if [ "$STATE" = "success" ] && [ -n "$TARGET" ]; then
                # Verify we can reach it (with bypass header)
                HTTP=$(curl -s -o /dev/null -w '%{http_code}' \
                  -H "x-vercel-protection-bypass: $BYPASS" "$TARGET")
                if [ "$HTTP" = "200" ] || [ "$HTTP" = "308" ]; then
                  echo "url=$TARGET" >> "$GITHUB_OUTPUT"
                  echo "✓ Deploy ready at $TARGET"
                  exit 0
                fi
                echo "  Got HTTP $HTTP, retrying..."
              fi
            else
              echo "  No deployment found yet (attempt $i/40)"
            fi
            sleep 15
          done
          echo "::error::Timed out waiting for Vercel deployment"
          exit 1

  # ── Step 4: Authenticated E2E against the preview URL ────────
  e2e-authenticated:
    name: E2E (Authenticated)
    runs-on: ubuntu-latest
    needs: [wait-for-deploy]
    if: needs.wait-for-deploy.outputs.url != ''
    timeout-minutes: 15
    env:
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
      POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
      PLAYWRIGHT_BASE_URL: ${{ needs.wait-for-deploy.outputs.url }}
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
      DOTENV_CONFIG_QUIET: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - name: Write env file
        run: |
          echo "SESSION_SECRET=$SESSION_SECRET" >> .env.local
          echo "POSTGRES_URL=$POSTGRES_URL" >> .env.local
          echo "POSTGRES_URL_NON_POOLING=$POSTGRES_URL_NON_POOLING" >> .env.local
          echo "PLAYWRIGHT_BASE_URL=$PLAYWRIGHT_BASE_URL" >> .env.local
          echo "VERCEL_AUTOMATION_BYPASS_SECRET=$VERCEL_AUTOMATION_BYPASS_SECRET" >> .env.local

      # Single step: skips browser download if cached, always installs
      # system deps (apt packages aren't in our cache).
      - name: Install Playwright + system deps
        run: npx playwright install --with-deps chromium

      - name: Seed test user
        run: npx tsx e2e/helpers/seed.ts

      - name: Run authenticated E2E against ${{ needs.wait-for-deploy.outputs.url }}
        run: npm run e2e:auth

      - uses: actions/upload-artifact@v4
        if: failure()
        with: { name: playwright-auth, path: playwright-report/, retention-days: 7 }
