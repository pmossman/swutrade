name: CI

on:
  push:
    branches: [main, beta]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      # API integration tests (tests/api/) need DB access.
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # Write .env.local so dotenv-based imports in test helpers work.
      - name: Write env file
        if: env.POSTGRES_URL != ''
        run: |
          echo "SESSION_SECRET=$SESSION_SECRET" >> .env.local
          echo "POSTGRES_URL=$POSTGRES_URL" >> .env.local

      - name: TypeScript
        run: npx tsc -b --force

      - name: Unit + API tests
        run: npx vitest run

      - name: Vite build
        run: npx vite build
