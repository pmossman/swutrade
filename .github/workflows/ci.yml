name: CI

on:
  push:
    branches: [main, beta]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # Typecheck the whole project (src + tests). Runs with --force to
      # bypass the incremental tsbuildinfo cache, matching what Vercel
      # does on a cold build — catches issues a warm local cache hides.
      - name: TypeScript
        run: npx tsc -b --force

      - name: Unit tests
        run: npx vitest run

      # Vite bundle build. Skips fetch-prices / enrich-cards since those
      # hit external APIs and would slow CI without adding signal —
      # tsc + vitest above cover the code surface.
      - name: Vite build
        run: npx vite build
