name: CI

on:
  push:
    branches: [main, beta]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Step 0: Post "deploying" message to #releases ────────────
  # Runs in parallel with check + e2e-anonymous. Captures the
  # Discord message id so notify-finish can PATCH the same message
  # with the outcome instead of posting a second one.
  notify-start:
    name: Notify Discord (start)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      message_id: ${{ steps.post.outputs.id }}
    steps:
      - name: Post start message
        id: post
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
          SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "DISCORD_RELEASE_WEBHOOK_URL secret missing — skipping"
            exit 0
          fi
          SHORT=${SHA:0:7}
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -1)
          BODY=$(jq -cn \
            --arg b "$BRANCH" --arg s "$SHORT" --arg cu "$COMMIT_URL" \
            --arg m "$FIRST_LINE" --arg ru "$RUN_URL" \
            '{ content: "🚀 **\($b)** deploying [`\($s)`](<\($cu)>) · \($m)\n[CI run](<\($ru)>)" }')
          RESP=$(curl -sS -H 'Content-Type: application/json' -d "$BODY" "${WEBHOOK_URL}?wait=true")
          MSG_ID=$(echo "$RESP" | jq -r '.id // empty')
          if [ -z "$MSG_ID" ]; then
            echo "::warning::Failed to capture message id. Response: $RESP"
            exit 0
          fi
          echo "id=$MSG_ID" >> "$GITHUB_OUTPUT"
          echo "Posted message $MSG_ID"

  # ── Step 1: Type check + unit/API tests + build ──────────────
  check:
    name: Types + Tests + Build
    runs-on: ubuntu-latest
    env:
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - name: Write env file
        if: env.POSTGRES_URL != ''
        run: |
          echo "SESSION_SECRET=$SESSION_SECRET" >> .env.local
          echo "POSTGRES_URL=$POSTGRES_URL" >> .env.local

      - name: TypeScript
        run: npx tsc -b --force

      - name: Unit + API tests
        run: npx vitest run

      - name: Vite build
        run: npx vite build

  # ── Step 2: Anonymous E2E (runs in parallel with check) ──────
  e2e-anonymous:
    name: E2E (Anonymous)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - id: weekkey
        run: echo "key=$(date +%Y-%U)" >> "$GITHUB_OUTPUT"

      - name: Cache card data
        id: datacache
        uses: actions/cache@v4
        with:
          path: |
            public/data
            scripts/cache
          key: card-data-${{ steps.weekkey.outputs.key }}

      - name: Fetch + enrich card data (cache miss only)
        if: steps.datacache.outputs.cache-hit != 'true'
        run: |
          FETCH_PRICES=1 npm run fetch-prices
          ENRICH=1 npm run enrich-cards

      - name: Cache Playwright browsers
        id: playwrightcache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwrightcache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached)
        if: steps.playwrightcache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run anonymous E2E
        run: npm run e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with: { name: playwright-anonymous, path: playwright-report/, retention-days: 7 }

  # ── Step 3: Wait for Vercel preview deploy ───────────────────
  wait-for-deploy:
    name: Wait for Vercel Deploy
    runs-on: ubuntu-latest
    needs: [check]
    if: github.event_name == 'push'
    timeout-minutes: 10
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Find and wait for Vercel deployment
        id: deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          SHA="${{ github.sha }}"
          REPO="${{ github.repository }}"
          echo "Waiting for Vercel deploy of $SHA..."

          # Poll GitHub deployments API for a deployment matching this commit
          for i in $(seq 1 40); do
            URL=$(gh api "repos/$REPO/deployments?sha=$SHA&per_page=5" \
              --jq '.[0].statuses_url // empty' 2>/dev/null)
            if [ -n "$URL" ]; then
              STATE=$(gh api "$URL" --jq '.[0].state // empty' 2>/dev/null)
              TARGET=$(gh api "$URL" --jq '.[0].target_url // empty' 2>/dev/null)
              echo "  Deploy state: $STATE ($TARGET)"
              # Short-circuit on terminal failure states. Without this
              # a failed deploy eats the full ~10 minute poll loop
              # while the e2e job downstream waits on its own timeout,
              # masking the actual error behind a generic CI timeout.
              case "$STATE" in
                failure|error)
                  echo "::error::Vercel deployment reported state=$STATE at $TARGET"
                  exit 1
                  ;;
              esac
              if [ "$STATE" = "success" ] && [ -n "$TARGET" ]; then
                # Verify we can reach it (with bypass header)
                HTTP=$(curl -s -o /dev/null -w '%{http_code}' \
                  -H "x-vercel-protection-bypass: $BYPASS" "$TARGET")
                if [ "$HTTP" = "200" ] || [ "$HTTP" = "308" ]; then
                  echo "url=$TARGET" >> "$GITHUB_OUTPUT"
                  echo "✓ Deploy ready at $TARGET"
                  exit 0
                fi
                echo "  Got HTTP $HTTP, retrying..."
              fi
            else
              echo "  No deployment found yet (attempt $i/40)"
            fi
            sleep 15
          done
          echo "::error::Timed out waiting for Vercel deployment"
          exit 1

  # ── Step 4: Authenticated E2E against the preview URL ────────
  e2e-authenticated:
    name: E2E (Authenticated)
    runs-on: ubuntu-latest
    needs: [wait-for-deploy]
    if: needs.wait-for-deploy.outputs.url != ''
    timeout-minutes: 15
    env:
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
      POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
      PLAYWRIGHT_BASE_URL: ${{ needs.wait-for-deploy.outputs.url }}
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
      # Activates the signed-interaction e2e spec (see
      # propose-accept.auth.spec.ts). The matching public key is
      # set on the Vercel Preview env as DISCORD_APP_PUBLIC_KEY_TEST.
      DISCORD_TEST_PRIVATE_KEY_B64: ${{ secrets.DISCORD_TEST_PRIVATE_KEY_B64 }}
      DOTENV_CONFIG_QUIET: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - name: Write env file
        run: |
          echo "SESSION_SECRET=$SESSION_SECRET" >> .env.local
          echo "POSTGRES_URL=$POSTGRES_URL" >> .env.local
          echo "POSTGRES_URL_NON_POOLING=$POSTGRES_URL_NON_POOLING" >> .env.local
          echo "PLAYWRIGHT_BASE_URL=$PLAYWRIGHT_BASE_URL" >> .env.local
          echo "VERCEL_AUTOMATION_BYPASS_SECRET=$VERCEL_AUTOMATION_BYPASS_SECRET" >> .env.local
          if [ -n "$DISCORD_TEST_PRIVATE_KEY_B64" ]; then
            echo "DISCORD_TEST_PRIVATE_KEY_B64=$DISCORD_TEST_PRIVATE_KEY_B64" >> .env.local
          fi

      # Single step: skips browser download if cached, always installs
      # system deps (apt packages aren't in our cache).
      - name: Install Playwright + system deps
        run: npx playwright install --with-deps chromium

      - name: Seed test user
        run: npx tsx e2e/helpers/seed.ts

      - name: Run authenticated E2E against ${{ needs.wait-for-deploy.outputs.url }}
        run: npm run e2e:auth

      - uses: actions/upload-artifact@v4
        if: failure()
        # Include test-results/ (where trace.zip, screenshots, and
        # videos land per playwright.auth.config.ts's `trace:
        # on-first-retry`). playwright-report/ alone just has the
        # HTML summary without actionable debug info.
        with:
          name: playwright-auth
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ── Step 4.5: Flip the message to "live" the moment the preview
  # deploy comes up, so the user knows they can poke new features
  # before full CI verification finishes. notify-finish will overwrite
  # this again at the very end with the aggregated outcome.
  notify-live:
    name: Notify Discord (live)
    runs-on: ubuntu-latest
    needs: [notify-start, wait-for-deploy]
    if: |
      github.event_name == 'push'
      && needs.notify-start.outputs.message_id != ''
      && needs.wait-for-deploy.result == 'success'
    steps:
      - name: PATCH message — deploy live, CI still verifying
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
          MSG_ID: ${{ needs.notify-start.outputs.message_id }}
          SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PREVIEW_URL: ${{ needs.wait-for-deploy.outputs.url }}
        run: |
          SHORT=${SHA:0:7}
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -1)
          BODY=$(jq -cn \
            --arg b "$BRANCH" --arg s "$SHORT" --arg cu "$COMMIT_URL" \
            --arg m "$FIRST_LINE" --arg ru "$RUN_URL" --arg pu "$PREVIEW_URL" \
            '{ content: "🟢 **\($b)** live [`\($s)`](<\($cu)>) · \($m)\n[preview](<\($pu)>) · [CI run](<\($ru)>) — still verifying" }')
          HTTP=$(curl -sS -o /tmp/resp.json -w '%{http_code}' -X PATCH \
            -H 'Content-Type: application/json' -d "$BODY" \
            "${WEBHOOK_URL}/messages/${MSG_ID}")
          if [ "$HTTP" != "200" ]; then
            echo "::error::PATCH failed: HTTP $HTTP"
            cat /tmp/resp.json
            exit 1
          fi

  # ── Step 5: PATCH the #releases message with the final outcome
  # Fires on push events regardless of upstream success; `if: always()`
  # + explicit message_id gate guarantee we only touch the message
  # that notify-start actually posted. `needs: [notify-live, ...]`
  # ensures the live-patch lands before the final-patch — otherwise
  # on a fast run they could race and the "live" state would briefly
  # overwrite the already-final "verified" state.
  notify-finish:
    name: Notify Discord (finish)
    runs-on: ubuntu-latest
    needs: [notify-start, notify-live, check, e2e-anonymous, wait-for-deploy, e2e-authenticated]
    if: always() && github.event_name == 'push' && needs.notify-start.outputs.message_id != ''
    steps:
      - name: PATCH message with outcome
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
          MSG_ID: ${{ needs.notify-start.outputs.message_id }}
          SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PREVIEW_URL: ${{ needs.wait-for-deploy.outputs.url }}
          CHECK_RESULT: ${{ needs.check.result }}
          ANON_RESULT: ${{ needs.e2e-anonymous.result }}
          DEPLOY_RESULT: ${{ needs.wait-for-deploy.result }}
          AUTH_RESULT: ${{ needs.e2e-authenticated.result }}
        run: |
          SHORT=${SHA:0:7}
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -1)
          # Overall outcome has three buckets: failure > cancelled > success.
          # A real failing job always wins — even if other jobs were
          # cancelled by a concurrent push — so genuine breakage still
          # surfaces as red. Pure cancellation (the common "push over
          # push" case) renders as a neutral "superseded" state, not
          # a red ❌. Skipped (e.g. auth-e2e on a PR) counts as success.
          OVERALL="success"
          for r in "$CHECK_RESULT" "$ANON_RESULT" "$DEPLOY_RESULT" "$AUTH_RESULT"; do
            case "$r" in
              failure) OVERALL="failure";;
              cancelled)
                if [ "$OVERALL" != "failure" ]; then OVERALL="cancelled"; fi
                ;;
            esac
          done
          case "$OVERALL" in
            success)
              PREFIX="✅"
              VERB="verified"
              ;;
            cancelled)
              PREFIX="⏭"
              VERB="superseded by new push"
              ;;
            *)
              PREFIX="❌"
              VERB="CI failed"
              ;;
          esac
          # Emoji per job for at-a-glance breakdown. Unicode chars
          # directly — shortcode names like :white_check_mark: contain
          # underscores that Discord's markdown parser treats as italic
          # markers, breaking the emoji substitution.
          emoji_for() {
            case "$1" in
              success) echo "✅";;
              failure) echo "❌";;
              cancelled) echo "🚫";;
              skipped) echo "⏭";;
              *) echo "❓";;
            esac
          }
          # Per-job breakdown is only interesting on a real failure — a
          # healthy run doesn't need four ✅ emojis repeating the single
          # green checkmark in the header, and a cancelled run has every
          # job in the same cancelled state so the breakdown is just
          # noise. Keep the message compact unless we actually failed.
          if [ "$OVERALL" = "failure" ]; then
            JOB_LINE="$(emoji_for "$CHECK_RESULT") check · $(emoji_for "$ANON_RESULT") anon e2e · $(emoji_for "$DEPLOY_RESULT") deploy · $(emoji_for "$AUTH_RESULT") auth e2e"
          else
            JOB_LINE=""
          fi
          # Preview link only when deploy succeeded + URL is set.
          if [ -n "$PREVIEW_URL" ] && [ "$DEPLOY_RESULT" = "success" ]; then
            LINKS="[CI run](<${RUN_URL}>) · [preview](<${PREVIEW_URL}>)"
          else
            LINKS="[CI run](<${RUN_URL}>)"
          fi
          BODY=$(jq -cn \
            --arg p "$PREFIX" --arg b "$BRANCH" --arg v "$VERB" --arg s "$SHORT" \
            --arg cu "$COMMIT_URL" --arg m "$FIRST_LINE" --arg j "$JOB_LINE" --arg l "$LINKS" \
            '{ content: (if $j == "" then "\($p) **\($b)** \($v) [`\($s)`](<\($cu)>) · \($m)\n\($l)" else "\($p) **\($b)** \($v) [`\($s)`](<\($cu)>) · \($m)\n\($j)\n\($l)" end) }')
          HTTP=$(curl -sS -o /tmp/resp.json -w '%{http_code}' -X PATCH \
            -H 'Content-Type: application/json' -d "$BODY" \
            "${WEBHOOK_URL}/messages/${MSG_ID}")
          if [ "$HTTP" != "200" ]; then
            echo "::error::PATCH failed: HTTP $HTTP"
            cat /tmp/resp.json
            exit 1
          fi
          echo "Updated message $MSG_ID → $OVERALL"
