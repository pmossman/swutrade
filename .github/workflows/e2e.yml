name: E2E

on:
  push:
    branches: [main, beta]
  pull_request:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  anonymous:
    name: Anonymous E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - id: weekkey
        run: echo "key=$(date +%Y-%U)" >> "$GITHUB_OUTPUT"

      - name: Cache card data
        id: datacache
        uses: actions/cache@v4
        with:
          path: |
            public/data
            scripts/cache
          key: card-data-${{ steps.weekkey.outputs.key }}

      - name: Fetch + enrich card data (cache miss only)
        if: steps.datacache.outputs.cache-hit != 'true'
        run: |
          FETCH_PRICES=1 npm run fetch-prices
          ENRICH=1 npm run enrich-cards

      - name: Cache Playwright browsers
        id: playwrightcache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwrightcache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached browser)
        if: steps.playwrightcache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run anonymous E2E (chromium + mobile-chrome)
        run: npm run e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-anonymous
          path: playwright-report/
          retention-days: 7

  # Authenticated E2E now runs in a separate workflow (e2e-auth.yml)
  # triggered by deployment_status events from Vercel, so it tests
  # against the real preview deploy URL — no vercel dev needed.
