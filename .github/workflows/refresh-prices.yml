name: Refresh Prices

on:
  schedule:
    # Every 2 hours (UTC).
    - cron: '0 */2 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook (skip build cache so prices re-fetch)
        run: curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}?buildCache=false"
